<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC-R QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

:root{
--gold:#FFD700;
--gold-dark:#DAA520;
--red:#8B0000;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'DM Sans',sans-serif;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
}

/* title */

.title{
font-size:22px;
font-weight:700;
margin-bottom:8px;
}

.subtitle{
font-size:14px;
color:#bbb;
margin-bottom:25px;
}

/* scanner */

.scanner-box{
width:280px;
height:280px;
border:3px solid var(--gold);
border-radius:18px;
overflow:hidden;
position:relative;
background:black;
}

#qr-reader{
width:100%;
height:100%;
}

/* scan line */

.scan-line{
position:absolute;
left:10px;
right:10px;
height:2px;
background:linear-gradient(90deg,transparent,var(--gold),transparent);
animation:scan 2s linear infinite;
}

@keyframes scan{
0%{top:10px}
50%{top:260px}
100%{top:10px}
}

/* result */

.result-box{
display:none;
margin-top:20px;
background:#e8f5e9;
color:#2e7d32;
padding:12px;
border-radius:10px;
font-size:14px;
text-align:center;
}

/* buttons */

.btn{
margin-top:20px;
padding:12px 18px;
border:none;
border-radius:12px;
font-weight:700;
font-size:14px;
cursor:pointer;
}

.btn-back{
background:#333;
color:white;
}

.btn-back:hover{
background:#444;
}

</style>
</head>

<body>

<div class="title">Scan QR Code</div>
<div class="subtitle">Point camera at classroom QR</div>

<div class="scanner-box">
<div id="qr-reader"></div>
<div class="scan-line"></div>
</div>

<div class="result-box" id="resultBox">
Attendance Recorded
</div>

<button class="btn btn-back" onclick="goBack()">Back</button>

<script>

let scanner;

/* detect device */

function isMobile(){
return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
|| window.innerWidth <= 768;
}

/* redirect */

function redirectDashboard(){

setTimeout(()=>{

if(isMobile()){
window.location.href="student-mobile.html";
}else{
window.location.href="student.html";
}

},1500)

}

/* success */

function onScanSuccess(decodedText){

document.getElementById("resultBox").style.display="block";

if(navigator.vibrate){
navigator.vibrate(200);
}

scanner.stop();

redirectDashboard();

}

/* start scanner */

function startScanner(){

scanner = new Html5Qrcode("qr-reader");

scanner.start(
{ facingMode:"environment" },
{
fps:10,
qrbox:250
},
onScanSuccess
);

}

startScanner();

/* back */

function goBack(){

if(isMobile()){
window.location.href="student-mobile.html";
}else{
window.location.href="student.html";
}

}

</script>

</body>
</html>
