<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SSC-R System Logs</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="admin-mobile.css">
  <style>
    /* ── STATS ROW: 3-col like desktop ── */
    .stats-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      padding: 0.85rem 0.75rem 0;
    }
    .stat-card-flat {
      background: #fff;
      border-radius: 12px;
      padding: 0.75rem 0.6rem;
      border: 2px solid var(--gold);
      box-shadow: 0 3px 10px rgba(0,0,0,.07);
      position: relative;
      overflow: hidden;
    }
    .stat-card-flat::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 100%; height: 3px;
    }
    .scf-total::before   { background: linear-gradient(90deg,#1a1a1a,#FFD700); }
    .scf-login::before   { background: linear-gradient(90deg,#16a34a,#4ade80); }
    .scf-edit::before    { background: linear-gradient(90deg,#b45309,#fbbf24); }
    .scf-export::before  { background: linear-gradient(90deg,#4f46e5,#818cf8); }
    .scf-error::before   { background: linear-gradient(90deg,#DC143C,#f87171); }
    .scf-logout::before  { background: linear-gradient(90deg,#64748b,#cbd5e1); }
    .scf-val {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.55rem;
      line-height: 1; margin-bottom: 0.18rem;
      background: var(--gradient-red-gold);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .scf-lbl {
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: #777;
    }

    /* ── CARD WRAPPER — white rounded card like desktop ── */
    .log-card {
      background: #fff;
      border-radius: 14px;
      border: 2px solid var(--gold);
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
      margin: 0.85rem 0.75rem 0;
      overflow: hidden;
    }
    .log-card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.85rem 1rem 0.65rem;
      border-bottom: 2px solid var(--gold);
    }
    .log-card-title {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.92rem;
      color: var(--primary); display: flex; align-items: center; gap: 0.4rem;
    }
    /* Yellow dot before title — like desktop */
    .title-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
    }
    /* Green "Live" pill — like desktop */
    .live-pill {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.65rem; font-weight: 700; color: #16a34a;
      font-family: 'DM Sans', sans-serif;
    }
    .live-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .log-card-btns { display: flex; gap: 0.35rem; }
    .lcbtn {
      padding: 0.38rem 0.7rem;
      border-radius: 8px; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.7rem; cursor: pointer; border: none;
    }
    .lcbtn-dark    { background: var(--primary); color: var(--gold); }
    .lcbtn-dark:active { opacity: 0.8; }
    .lcbtn-success { background: #16a34a; color: #fff; }
    .lcbtn-success:active { opacity: 0.8; }

    /* ── FILTERS ── */
    .log-filters {
      padding: 0.65rem 0.75rem 0;
    }
    .filter-search {
      width: 100%; padding: 0.55rem 0.9rem;
      border: 1.5px solid var(--gold); border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      outline: none; background: #fff; margin-bottom: 0.45rem;
    }
    .filter-search:focus { border-color: var(--red); }
    .filter-selects {
      display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.45rem;
    }
    .filter-selects select, .filter-selects input[type="date"] {
      flex: 1; min-width: 80px;
      padding: 0.48rem 0.45rem;
      border: 1.5px solid var(--gold); border-radius: 9px;
      font-family: 'DM Sans', sans-serif; font-size: 0.7rem;
      background: #fff; color: var(--primary); font-weight: 600;
      outline: none; cursor: pointer;
    }
    .filter-selects select:focus, .filter-selects input[type="date"]:focus { border-color: var(--red); }
    .clear-chip {
      padding: 0.42rem 0.8rem;
      background: rgba(220,20,60,.08); border: 1.5px solid rgba(220,20,60,.35);
      border-radius: 9px; color: var(--red-dark);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.7rem;
      cursor: pointer;
    }

    /* ── MOBILE CARD-LIST ── */
    .log-list-header {
      display: grid;
      grid-template-columns: 28px 1fr 68px 44px;
      padding: 0.42rem 0.75rem;
      background: var(--primary);
      font-family: 'Syne', sans-serif; font-size: 0.6rem;
      font-weight: 700; color: var(--gold);
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 2px solid var(--gold);
    }
    .log-row {
      display: grid;
      grid-template-columns: 28px 1fr 68px 44px;
      align-items: start;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid rgba(255,215,0,.12);
      background: #fff;
      cursor: pointer; transition: background .15s;
    }
    .log-row:last-child { border-bottom: none; }
    .log-row:active { background: rgba(255,215,0,.06); }
    .log-row-num { font-size: 0.67rem; color: #bbb; padding-top: 0.15rem; }
    .log-row-body { min-width: 0; padding-right: 0.4rem; }
    .log-row-top {
      display: flex; align-items: center; gap: 0.3rem;
      flex-wrap: wrap; margin-bottom: 0.18rem;
    }
    .log-row-user {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.75rem; color: #1a1a1a;
    }
    .log-row-desc {
      font-size: 0.7rem; color: #666; line-height: 1.35;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .log-row-time {
      font-size: 0.62rem; color: #999; text-align: right;
      line-height: 1.35; padding-top: 0.15rem;
      word-break: break-word;
    }
    .log-row-actions {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.3rem; padding-top: 0.1rem;
    }

    /* ── ACTION BADGES with dot prefix — matches desktop ── */
    .log-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.2rem 0.6rem; border-radius: 20px;
      font-size: 0.68rem; font-weight: 700; font-family: 'Syne', sans-serif;
    }
    .log-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; opacity: 0.75; flex-shrink: 0;
    }
    .log-login    { background: rgba(34,197,94,.12);   color: #16a34a; }
    .log-logout   { background: rgba(148,163,184,.15); color: #64748b; }
    .log-edit     { background: rgba(245,158,11,.14);  color: #b45309; }
    .log-generate { background: rgba(99,102,241,.12);  color: #4f46e5; }
    .log-export   { background: rgba(59,130,246,.12);  color: #1d4ed8; }
    .log-print    { background: rgba(139,92,246,.12);  color: #7c3aed; }
    .log-view     { background: rgba(20,184,166,.12);  color: #0f766e; }
    .log-error    { background: rgba(220,20,60,.12);   color: #c62828; }
    .log-system   { background: rgba(255,215,0,.15);   color: #b45309; }

    /* ── ROLE BADGE ── */
    .role-badge {
      display: inline-block; padding: 0.18rem 0.55rem; border-radius: 20px;
      font-size: 0.65rem; font-weight: 700;
      background: rgba(255,215,0,.15); color: #DAA520;
      border: 1.5px solid rgba(255,215,0,.3);
    }
    .role-badge.faculty {
      background: rgba(99,102,241,.1); color: #4f46e5;
      border-color: rgba(99,102,241,.3);
    }

    /* ── SEV DOT ── */
    .sev { display: inline-block; width: 9px; height: 9px; border-radius: 50%; }
    .sev-info    { background: #22c55e; }
    .sev-warning { background: #f59e0b; }
    .sev-error   { background: #ef4444; animation: pulse 1.5s infinite; }

    /* ── VIEW BUTTON in table — like desktop ── */
    .view-btn {
      padding: 0.22rem 0.65rem;
      background: var(--primary); color: var(--gold);
      border: none; border-radius: 7px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.68rem;
      cursor: pointer; white-space: nowrap;
    }
    .view-btn:active { opacity: 0.8; }

    /* ── PAGINATION ── */
    .log-pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 0.3rem; padding: 0.65rem 0.75rem;
      flex-wrap: wrap;
    }

    /* ── MODAL ── */
    .detail-desc {
      margin-top: 0.75rem; padding: 0.75rem; background: #fffbf0;
      border-radius: 10px; border: 1px solid rgba(255,215,0,.3);
      font-size: 0.82rem; color: #555; line-height: 1.5;
    }
    .empty-state {
      text-align: center; padding: 2.5rem 1rem;
      color: #aaa; font-size: 0.85rem;
    }
  </style>
  <!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8B0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="sscrmnlofficiallogo.png">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sscr_attendance/sw.js');
  }
</script>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
  <img src="sscrmnlofficiallogo.png" alt="SSC-R" class="top-logo">
  <div class="top-right">
    <button class="tb-btn" onclick="goBack()" style="font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;color:var(--gold);padding:.4rem .75rem;">Admin</button>
    <div class="avatar-sm">JG</div>
  </div>
</header>

<!-- PAGE: LOGS -->
<div class="page active" id="page-logs">

  <!-- PROFILE STRIP — same as admin -->
  <div class="profile-strip">
    <div class="avatar-lg">JG</div>
    <div class="profile-info">
      <div class="profile-name">Julliana Louisse Gonzaga</div>
      <div class="profile-role">System Administrator</div>
    </div>
    <button class="btn-logout" onclick="goBack()">Back</button>
  </div>

  <!-- STATS ROW: 3-col × 2 rows — matches desktop's 6-card row -->
  <div class="stats-row-3">
    <div class="stat-card-flat scf-total">
      <div class="scf-val" id="statTotal">—</div>
      <div class="scf-lbl">Total Logs</div>
    </div>
    <div class="stat-card-flat scf-login">
      <div class="scf-val" id="statLogin">—</div>
      <div class="scf-lbl">Logins</div>
    </div>
    <div class="stat-card-flat scf-edit">
      <div class="scf-val" id="statEdit">—</div>
      <div class="scf-lbl">Edits</div>
    </div>
  </div>
  <div class="stats-row-3" style="padding-top:0.45rem;">
    <div class="stat-card-flat scf-export">
      <div class="scf-val" id="statExport">—</div>
      <div class="scf-lbl">Exports</div>
    </div>
    <div class="stat-card-flat scf-error">
      <div class="scf-val" id="statError">—</div>
      <div class="scf-lbl">Errors</div>
    </div>
    <div class="stat-card-flat scf-logout">
      <div class="scf-val" id="statLogout">—</div>
      <div class="scf-lbl">Logouts</div>
    </div>
  </div>

  <!-- LOG CARD — white card wrapping title + filters + table, like desktop -->
  <div class="log-card">

    <!-- Card Header: title + Refresh/Export/Clear Logs -->
    <div class="log-card-header">
      <div class="log-card-title">
        <span class="title-dot"></span>
        System Activity Logs
        <span class="live-pill"><span class="live-dot"></span>Live</span>
      </div>
      <div class="log-card-btns">
        <button class="lcbtn lcbtn-dark" onclick="refreshLogs()">Refresh</button>
        <button class="lcbtn lcbtn-dark" onclick="exportLogs()">Export</button>
        <button class="lcbtn lcbtn-success" onclick="clearLogs()">Clear Logs</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="log-filters">
      <input type="text" class="filter-search" id="searchInput"
             placeholder="Search user, action, description…"
             oninput="_page=1;renderLogs()">
      <div class="filter-selects">
        <select id="filterType" onchange="_page=1;renderLogs()">
          <option value="">All Actions</option>
          <option value="Login">Login</option>
          <option value="Logout">Logout</option>
          <option value="Edit">Edit</option>
          <option value="Generate">Generate</option>
          <option value="Export">Export</option>
          <option value="Print">Print</option>
          <option value="View">View</option>
          <option value="Error">Error</option>
          <option value="System">System</option>
        </select>
        <select id="filterRole" onchange="_page=1;renderLogs()">
          <option value="">All Roles</option>
          <option value="Administrator">Administrator</option>
          <option value="Faculty">Faculty</option>
        </select>
        <select id="filterSeverity" onchange="_page=1;renderLogs()">
          <option value="">All Severity</option>
          <option value="info">Info</option>
          <option value="warning">Warning</option>
          <option value="error">Error</option>
        </select>
        <input type="date" id="filterDate" onchange="_page=1;renderLogs()">
        <button class="clear-chip" onclick="clearFilters()">&#10005; Clear</button>
      </div>
    </div>

    <!-- Mobile card-list -->
    <div class="log-list-header">
      <span>#</span>
      <span>User / Action / Description</span>
      <span style="text-align:right;padding-right:.4rem">Time</span>
      <span style="text-align:center">Act</span>
    </div>
    <div id="logsTableBody"></div>

    <div class="log-pagination" id="paginationWrap"></div>
  </div>

  <div class="spacer"></div>
</div>

<!-- PAGE: SETTINGS -->
<div class="page" id="page-settings">
  <div class="section">
    <div class="section-hdr"><div class="section-title">Settings</div></div>
    <div class="settings-section">
      <div class="settings-section-title">Admin Profile</div>
      <div class="settings-form-row"><label>Full Name</label><input class="settings-input" value="Julliana Louisse Gonzaga"></div>
      <div class="settings-form-row"><label>Role</label><input class="settings-input" value="System Administrator" readonly style="background:#f5f5f5;"></div>
      <div class="settings-form-row"><label>Email</label><input class="settings-input" value="admin@sscr.edu.ph" type="email"></div>
      <button class="btn btn-primary btn-full" style="margin-top:0.5rem;" onclick="alert('Profile saved!')">Save Changes</button>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">Security</div>
      <div class="settings-form-row"><label>Current Password</label><input class="settings-input" type="password" placeholder="••••••••"></div>
      <div class="settings-form-row"><label>New Password</label><input class="settings-input" type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-full" style="margin-top:0.5rem;" onclick="alert('Password updated!')">Update Password</button>
    </div>
    <button class="btn btn-danger btn-full" onclick="goBack()">Logout</button>
  </div>
  <div class="spacer"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-logs" onclick="goPage('logs')">
    <span class="nav-label">Logs</span>
  </button>
  <button class="nav-btn" id="nav-settings" onclick="goPage('settings')">
    <span class="nav-label">Settings</span>
  </button>
</nav>

<!-- DETAIL MODAL — bottom sheet -->
<div id="detailModal" class="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span class="modal-ttl">Log Entry Details</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const ROWS_PER_PAGE = 10;
let _page = 1;
let _filtered = [];

// ── Data ────────────────────────────────────────────────────────────────────
const USERS = [
  {name:'Julliana Louisse Gonzaga', role:'Administrator', ip:'192.168.1.10'},
  {name:'Agnes Bernal',             role:'Faculty',       ip:'192.168.1.22'},
  {name:'Gary Soriano',             role:'Faculty',       ip:'192.168.1.35'},
  {name:'Rheymard Doneza',          role:'Faculty',       ip:'192.168.1.47'},
];
const LOG_TEMPLATES = [
  {action:'Login',    severity:'info',    desc:(u)=>`${u.name} logged in successfully.`},
  {action:'Logout',   severity:'info',    desc:(u)=>`${u.name} logged out of the system.`},
  {action:'Edit',     severity:'warning', desc:(u)=>`${u.name} edited attendance record for student 2026-00${10+Math.floor(Math.random()*40)}.`},
  {action:'Generate', severity:'info',    desc:(u)=>`${u.name} generated ${['Daily','Weekly','Monthly'][Math.floor(Math.random()*3)]} attendance report.`},
  {action:'Export',   severity:'info',    desc:(u)=>`${u.name} exported attendance data as ${['Excel','CSV'][Math.floor(Math.random()*2)]}.`},
  {action:'Print',    severity:'info',    desc:(u)=>`${u.name} printed attendance report for ${['Sec A','Sec B','Sec C'][Math.floor(Math.random()*3)]}.`},
  {action:'View',     severity:'info',    desc:(u)=>`${u.name} viewed attendance details for student 2026-00${10+Math.floor(Math.random()*40)}.`},
  {action:'Error',    severity:'error',   desc:(u)=>`Failed login attempt detected from IP ${u.ip}. Invalid credentials.`},
  {action:'System',   severity:'info',    desc:()=>'System backup completed successfully.'},
  {action:'System',   severity:'warning', desc:()=>'High memory usage detected. System running at 87% capacity.'},
  {action:'Edit',     severity:'warning', desc:(u)=>`${u.name} bulk-updated attendance for Section ${['A','B','C'][Math.floor(Math.random()*3)]}.`},
  {action:'Login',    severity:'error',   desc:(u)=>`${u.name} — session expired. Forced re-login required.`},
];

function generateLogs() {
  const logs = [], now = new Date();
  for (let i = 0; i < 120; i++) {
    const minsAgo = i * (3 + Math.floor(Math.random() * 12));
    const ts   = new Date(now.getTime() - minsAgo * 60000);
    const user = USERS[Math.floor(Math.random() * USERS.length)];
    const tpl  = LOG_TEMPLATES[Math.floor(Math.random() * LOG_TEMPLATES.length)];
    logs.push({
      id: 'LOG-' + String(120 - i).padStart(5, '0'),
      timestamp: ts, user: user.name, role: user.role, ip: user.ip,
      action: tpl.action, severity: tpl.severity, desc: tpl.desc(user),
    });
  }
  return logs;
}
let ALL_LOGS = generateLogs();

// ── Stats ────────────────────────────────────────────────────────────────────
function updateStats(logs) {
  document.getElementById('statTotal').textContent  = logs.length;
  document.getElementById('statLogin').textContent  = logs.filter(l => l.action === 'Login').length;
  document.getElementById('statEdit').textContent   = logs.filter(l => l.action === 'Edit').length;
  document.getElementById('statExport').textContent = logs.filter(l => l.action === 'Export' || l.action === 'Print').length;
  document.getElementById('statError').textContent  = logs.filter(l => l.severity === 'error').length;
  document.getElementById('statLogout').textContent = logs.filter(l => l.action === 'Logout').length;
}

// ── Format ───────────────────────────────────────────────────────────────────
function fmtTimestamp(dt) {
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) +
    ' ' + dt.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
function fmtDateOnly(dt) {
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderLogs() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const fType  = document.getElementById('filterType').value;
  const fRole  = document.getElementById('filterRole').value;
  const fSev   = document.getElementById('filterSeverity').value;
  const fDate  = document.getElementById('filterDate').value;

  _filtered = ALL_LOGS.filter(l => {
    if (fType && l.action    !== fType) return false;
    if (fRole && l.role      !== fRole) return false;
    if (fSev  && l.severity  !== fSev)  return false;
    if (fDate && fmtDateOnly(l.timestamp) !== fDate) return false;
    if (search && !(
      l.user.toLowerCase().includes(search)   ||
      l.action.toLowerCase().includes(search) ||
      l.desc.toLowerCase().includes(search)   ||
      l.id.toLowerCase().includes(search)
    )) return false;
    return true;
  });

  updateStats(_filtered.length ? _filtered : ALL_LOGS);

  const tbody      = document.getElementById('logsTableBody');
  const total      = _filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / ROWS_PER_PAGE));
  if (_page > totalPages) _page = totalPages;

  tbody.innerHTML = '';
  if (!total) {
    tbody.innerHTML = '<div class="empty-state">No logs found.<br><span style="font-size:.8rem">Try adjusting your filters or search term.</span></div>';
    buildPagination(0, 0); return;
  }

  const start    = (_page - 1) * ROWS_PER_PAGE;
  const pageRows = _filtered.slice(start, start + ROWS_PER_PAGE);

  pageRows.forEach((l, i) => {
    const ac  = 'log-' + l.action.toLowerCase();
    const rc  = l.role === 'Faculty' ? 'role-badge faculty' : 'role-badge';
    const idx = start + i;
    window['logs_ref_' + idx] = l;

    // Short time: "Mar 7, 03:45 PM"
    const tShort = l.timestamp.toLocaleDateString('en-US',{month:'short',day:'numeric'}) +
      ' ' + l.timestamp.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

    const row = document.createElement('div');
    row.className = 'log-row';
    row.onclick = () => showDetail(l);
    row.innerHTML =
      `<div class="log-row-num">${idx + 1}</div>` +
      `<div class="log-row-body">` +
        `<div class="log-row-top">` +
          `<span class="log-row-user">${l.user.split(' ')[0]} ${l.user.split(' ').slice(-1)[0]}</span>` +
          `<span class="${rc}" style="font-size:.58rem;padding:.1rem .4rem">${l.role === 'Faculty' ? 'Faculty' : 'Admin'}</span>` +
        `</div>` +
        `<div style="margin-bottom:.18rem"><span class="log-badge ${ac}">${l.action}</span></div>` +
        `<div class="log-row-desc">${l.desc}</div>` +
      `</div>` +
      `<div class="log-row-time">${tShort}</div>` +
      `<div class="log-row-actions">` +
        `<span class="sev sev-${l.severity}" title="${l.severity}"></span>` +
        `<button class="view-btn" onclick="event.stopPropagation();showDetail(window['logs_ref_${idx}'])">View</button>` +
      `</div>`;
    tbody.appendChild(row);
  });

  buildPagination(totalPages, total);
}

// ── Detail Modal ─────────────────────────────────────────────────────────────
function showDetail(log) {
  const sevColors = {info:'#16a34a', warning:'#b45309', error:'#c62828'};
  const ac = 'log-' + log.action.toLowerCase();
  const rc = log.role === 'Faculty' ? 'role-badge faculty' : 'role-badge';

  const drow = (lbl, val) =>
    `<div class="detail-row"><div class="dr-lbl">${lbl}</div><div class="dr-val">${val}</div></div>`;

  document.getElementById('modalBody').innerHTML =
    drow('Log ID',     `<code style="font-size:.82rem;background:#f5f5f5;padding:2px 6px;border-radius:4px">${log.id}</code>`) +
    drow('Timestamp',  fmtTimestamp(log.timestamp)) +
    drow('User',       `<strong>${log.user}</strong>`) +
    drow('Role',       `<span class="${rc}">${log.role}</span>`) +
    drow('Action',     `<span class="log-badge ${ac}">${log.action}</span>`) +
    drow('Severity',   `<span style="font-weight:700;color:${sevColors[log.severity]}">${log.severity.charAt(0).toUpperCase()+log.severity.slice(1)}</span>`) +
    drow('IP Address', `<code style="font-size:.82rem">${log.ip}</code>`) +
    `<div class="detail-desc">${log.desc}</div>`;

  document.getElementById('detailModal').classList.add('show');
}
function closeModal() { document.getElementById('detailModal').classList.remove('show'); }
window.onclick = function(e) { if (e.target === document.getElementById('detailModal')) closeModal(); };

// ── Pagination ────────────────────────────────────────────────────────────────
function buildPagination(totalPages, totalRows) {
  const wrap = document.getElementById('paginationWrap');
  wrap.innerHTML = '';
  if (!totalRows) return;
  const mk = (lbl, pg, dis, act) => {
    const b = document.createElement('button');
    b.className = 'page-btn' + (act ? ' active' : '');
    b.textContent = lbl; b.disabled = dis;
    b.onclick = () => { _page = pg; renderLogs(); };
    wrap.appendChild(b);
  };
  mk('‹', _page - 1, _page === 1, false);
  let s = Math.max(1, _page - 2), e = Math.min(totalPages, s + 4);
  if (e - s < 4) s = Math.max(1, e - 4);
  for (let p = s; p <= e; p++) mk(p, p, false, p === _page);
  mk('›', _page + 1, _page === totalPages, false);
  const lbl = document.createElement('span');
  lbl.style.cssText = 'font-size:.75rem;color:#999;margin-left:.5rem;line-height:30px';
  const st = (_page - 1) * ROWS_PER_PAGE + 1, en = Math.min(_page * ROWS_PER_PAGE, totalRows);
  lbl.textContent = st + '–' + en + ' of ' + totalRows + ' logs';
  wrap.appendChild(lbl);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function refreshLogs() {
  const user = USERS[0];
  ALL_LOGS.unshift({
    id: 'LOG-' + String(ALL_LOGS.length + 1).padStart(5, '0'),
    timestamp: new Date(), user: user.name,
    role: user.role, ip: user.ip,
    action: 'System', severity: 'info',
    desc: 'Logs refreshed manually by ' + user.name + '.',
  });
  _page = 1; renderLogs();
}
function clearFilters() {
  ['searchInput','filterType','filterRole','filterSeverity','filterDate'].forEach(id => document.getElementById(id).value = '');
  _page = 1; renderLogs();
}
function clearLogs() {
  if (!confirm('Are you sure you want to clear all system logs? This cannot be undone.')) return;
  ALL_LOGS = [{
    id: 'LOG-00001', timestamp: new Date(), user: 'Julliana Louisse Gonzaga',
    role: 'Administrator', ip: '192.168.1.10', action: 'System', severity: 'warning',
    desc: 'All system logs cleared by Administrator.',
  }];
  _page = 1; renderLogs();
}
function exportLogs() {
  const rows = _filtered.length ? _filtered : ALL_LOGS;
  if (!rows.length) { alert('No logs to export.'); return; }
  const wsData = [['Log ID','Timestamp','User','Role','Action','Description','IP Address','Severity']];
  rows.forEach(l => wsData.push([l.id, fmtTimestamp(l.timestamp), l.user, l.role, l.action, l.desc, l.ip, l.severity]));
  if (typeof XLSX !== 'undefined') {
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = [{wch:12},{wch:22},{wch:28},{wch:14},{wch:10},{wch:55},{wch:14},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws, 'System Logs');
    XLSX.writeFile(wb, 'SSC-R_SystemLogs_' + fmtDateOnly(new Date()) + '.xlsx');
  } else {
    const csv = wsData.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'SSC-R_SystemLogs_' + fmtDateOnly(new Date()) + '.csv';
    a.click();
  }
}
function goBack() { window.location.href = 'admin-mobile.html'; }
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const nb = document.getElementById('nav-' + id);
  if (nb) nb.classList.add('active');
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateStats(ALL_LOGS);
  renderLogs();
});
</script>
